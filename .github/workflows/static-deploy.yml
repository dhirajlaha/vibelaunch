name: Static Site CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-validate:
    name: Build, Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify static output
        run: npm run verify:static

      - name: Assert output directory exists
        run: |
          test -f out/index.html          || (echo "FAIL: out/index.html missing" && exit 1)
          test -f out/services/index.html || (echo "FAIL: out/services/index.html missing" && exit 1)
          test -f out/about/index.html    || (echo "FAIL: out/about/index.html missing" && exit 1)
          test -f out/faq/index.html      || (echo "FAIL: out/faq/index.html missing" && exit 1)
          test -f out/robots.txt          || (echo "FAIL: out/robots.txt missing" && exit 1)
          test -f out/sitemap.xml         || (echo "FAIL: out/sitemap.xml missing" && exit 1)
          echo "All required output files present."

      - name: Upload static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-out
          path: out/
          retention-days: 7
